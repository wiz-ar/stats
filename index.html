<style>
  :root {

    --accent3: #4ecdc4;
    --accent4: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
  }
  .header-title h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 2.5vw, 32px);
    font-weight: 900;
    letter-spacing: -0.5px;
    color: #fff;
    line-height: 1.1;
  }
  .header-title h1 span { color: var(--accent); }
  .header-sub { font-size: 13px; color: var(--text-muted); margin-top: 6px; font-weight: 300; }
  .header-stats { display: flex; gap: 28px; align-items: center; flex-shrink: 0; }
  .hstat { text-align: right; }
  .hstat-num { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--accent); line-height: 1; }
  .hstat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 3px; }
  .layout { display: flex; flex: 1; min-height: 0; }
  aside {
    width: 280px; flex-shrink: 0; background: var(--bg2);
    border-right: 1px solid var(--border); overflow-y: scroll; padding: 0px 0 30px;height: 85vh;
  }
  .sidebar-section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text-muted); padding: 14px 20px 6px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid;
  }
  .sidebar-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .career-btn {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 9px 20px; background: none; border: none; cursor: pointer;
    text-align: left; color: var(--text-muted); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 400; transition: all 0.15s;
    border-left: 3px solid transparent; gap: 8px;

  .career-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .career-btn.active { color: #fff; background: rgba(245,166,35,0.1); border-left-color: var(--accent); font-weight: 600; }
  .career-btn .cn { flex: 1; line-height: 1.3; }
  .career-badge { font-size: 11px; background: rgba(255,255,255,0.06); border-radius: 20px; padding: 2px 7px; color: var(--text-muted); flex-shrink: 0; font-weight: 500; }
  .career-btn.active .career-badge { background: rgba(245,166,35,0.2); color: var(--accent); }

  .career-name em { font-style: normal; color: var(--accent); font-size: 20px; display: block; }
  .career-pill { display: inline-block; font-size: 11px; background: rgba(245,166,35,0.15); color: var(--accent); border: 1px solid rgba(245,166,35,0.3); border-radius: 20px; padding: 3px 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; animation: fadeUp 0.35s ease 0.05s both; }
  .kpi-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; position: relative; overflow: hidden; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 12px 12px 0 0; }
  .kpi-age::before  { background: var(--accent); }
  .kpi-exp::before  { background: var(--accent2); }
  .kpi-know::before { background: var(--accent3); }
  .kpi-rec::before  { background: var(--accent4); }
  .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); font-weight: 600; margin-bottom: 10px; }
  .kpi-value { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 700; line-height: 1; color: #fff; }

  .kpi-exp  .kpi-value { color: var(--accent2); }
  .kpi-know .kpi-value { color: var(--accent3); }
  .kpi-rec  .kpi-value { color: var(--accent4); }

  .kpi-desc { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.4; }
  .bottom-grid { display: grid; grid-template-columns: 1fr 1.55fr; gap: 20px; animation: fadeUp 0.35s ease 0.1s both; align-items: start; }
  .panel { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }

  .palabra-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; gap: 8px; }
  .palabra-name { font-size: 13.5px; font-weight: 600; color: #fff; }

  .palabra-right { display: flex; align-items: baseline; gap: 6px; flex-shrink: 0; }
  .palabra-pct { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; }
  .palabra-n { font-size: 11px; color: var(--text-muted); }
  .bar-track { height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }

  .pc-0{color:var(--accent)}.pc-1{color:var(--accent2)}.pc-2{color:var(--accent3)}.pc-3{color:var(--accent4)}.pc-4{color:#64b5f6}.pc-5{color:#81c784}.pc-6{color:#ffb74d}.pc-o{color:var(--text-muted)}

  'Moda':                  ['Diseño de Moda','Producción de Modas','Marketing de la Moda','Comunicación de Moda'],
  'Diseño':                ['Diseño Gráfico','Diseño de Interiores','Diseño Industrial','Lic. en Diseño (D+N+T)','Diseño de Ilustración','Diseño Digital'],
  'Comunicación':          ['Lic. en Publicidad','Dirección de Comunicación','Lic. en Comunicación Digital','Organización de Eventos','Dirección Creativa Publicitaria','Lic. en Relaciones Públicas'],
  'Audiovisual':           ['Lic. en Com. Audiovisual','Producción Musical','Diseño de Música y Sonido','Lic. en Dir. Cinematográfica','Lic. en Creación Sonora','Lic. en Fotografía','Actuación Profesional'],
  'Ciclo Complementación': ['Lic. en Diseño (CCC)','Lic. en Negocios de Diseño','Lic. en Gestión de Proyectos']
};

// ─── BUILD SIDEBAR
const sidebar = document.getElementById('sidebar');
const mainEl  = document.getElementById('main');
let currentKey = null;

Object.entries(groups).forEach(([gName, keys]) => {
  const lbl = document.createElement('div');
  lbl.className = 'sidebar-section-label';
  lbl.textContent = gName;
  sidebar.appendChild(lbl);
  keys.forEach(k => {
    if (!data[k]) return;
    const btn = document.createElement('button');
    btn.className = 'career-btn';
    btn.id = 'btn-' + k;
    btn.innerHTML = `<span class="cn">${k}</span><span class="career-badge">${data[k].n}</span>`;
    btn.addEventListener('click', () => showCareer(k));
    sidebar.appendChild(btn);
  });
});

// ─── SHOW CAREER
function showCareer(key) {
  if (currentKey) document.getElementById('btn-' + currentKey)?.classList.remove('active');
  currentKey = key;
  const btn = document.getElementById('btn-' + key);
  btn?.classList.add('active');
  btn?.scrollIntoView({behavior:'smooth', block:'nearest'});

  const d = data[key];
  const isSmall = d.n < 15;

  // Separate standard vs custom palabras
  const stdP = d.palabras.filter(x => STANDARD.includes(x.p)).sort((a,b) => b.v - a.v);
  const cusP = d.palabras.filter(x => !STANDARD.includes(x.p));

  let palHTML = stdP.map((x,i) => palaItem(x, PBARS[i]||'pbar-o', PCS[i]||'pc-o', false)).join('');
  if (cusP.length) {
    palHTML += `<div class="palabras-divider">otras respuestas</div>`;
    palHTML += cusP.map(x => palaItem(x,'pbar-o','pc-o',true)).join('');
  }

  mainEl.innerHTML = `
    <div class="career-header">
      <span class="career-pill">${d.n} respuesta${d.n!==1?'s':''}${isSmall?' · Muestra pequeña':''}  - Ingreso 2026</span>
      <div class="career-name">${fmt(d.full)}</div>
    </div>
    <div class="kpi-grid">
      <div class="kpi-card kpi-age">
        <div class="kpi-label">Edad promedio</div>
        <div class="kpi-value">${d.avg_age}<span class="kpi-unit"> años</span></div>
        <div class="kpi-desc">Promedio de edad de los ingresantes</div>
      </div>
      <div class="kpi-card kpi-exp">
        <div class="kpi-label">Estudios previos</div>
        <div class="kpi-value">${d.pct_otra}<span class="kpi-unit">%</span></div>
        <div class="kpi-desc">Estudiaron o estudian otra carrera universitaria o terciaria</div>
      </div>
      <div class="kpi-card kpi-know">
        <div class="kpi-label">Conoce a alguien</div>
        <div class="kpi-value">${d.pct_conoce}<span class="kpi-unit">%</span></div>
        <div class="kpi-desc">Conocen a alguien que estudia en la Facultad de D&C</div>
      </div>
      <div class="kpi-card kpi-rec">
        <div class="kpi-label">Le recomendaron</div>
        <div class="kpi-value">${d.pct_recom}<span class="kpi-unit">%</span></div>
        <div class="kpi-desc">Recibieron una recomendación de la Facultad</div>
      </div>
    </div>
    <div class="bottom-grid">
      <div class="panel">
        <div class="panel-title">Palabras con que identifican a la Facultad</div>
        <div class="palabras-list">${palHTML}</div>
        <div class="note-sm">% sobre el total de respuestas de la carrera (n=${d.n}) · múltiple opción</div>
      </div>
      <div class="panel">
        <div class="panel-title">¿Cómo se ven en el futuro?</div>
        <div class="futuro-list">
          ${d.futuro.map((f,i)=>`
            <div class="futuro-item">
              <div class="futuro-label" title="${f.o}">${f.o}</div>
              <div class="futuro-bar-track"><div class="futuro-bar-fill" style="width:0%;background:${FCOLORS[i]||'#888'}" data-width="${f.v}%"></div></div>
              <div class="futuro-pct" style="color:${FCOLORS[i]||'#888'}">${f.v}%</div>
            </div>`).join('')}
        </div>
        <div class="note-sm">% sobre el total de respuestas de la carrera · múltiple opción</div>
      </div>
    </div>
    ${isSmall?`<p style="margin-top:16px;font-size:12px;color:var(--text-muted);font-style:italic;">⚠ Menos de 15 respuestas. Interpretar con cautela.</p>`:''}
  `;

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    mainEl.querySelectorAll('[data-width]').forEach(el=>{ el.style.width = el.getAttribute('data-width'); });
  }));
}

function palaItem(x, barC, pcC, custom) {
  return `<div class="palabra-item">
    <div class="palabra-header">
      <span class="palabra-name${custom?' custom':''}">${x.p}</span>
      <span class="palabra-right">
        <span class="palabra-pct ${pcC}">${x.v}%</span>
        <span class="palabra-n">(${x.n})</span>
      </span>
    </div>
    <div class="bar-track"><div class="bar-fill ${barC}" data-width="${x.v}%" style="width:0%"></div></div>
  </div>`;
}

function fmt(s) { return s.replace(/\(([^)]+)\)/g,'<em>($1)</em>'); }

showCareer('Diseño de Moda');
</script>
