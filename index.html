<style>
  :root {
    --bg: #0d0e14;
    --bg2: #13141c;
    --bg3: #1a1b26;
    --border: rgba(255,255,255,0.07);
    --text: #e8e9f0;
    --text-muted: #FFFFFF;
    --accent: #f5a623;
    --accent2: #e8528a;
    --accent3: #4ecdc4;
    --accent4: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── HEADER ─── */
  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
  }
  .header-title h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 2.5vw, 32px);
    font-weight: 900;
    letter-spacing: -0.5px;
    color: #fff;
    line-height: 1.1;
  }
  .header-title h1 span { color: var(--accent); }
  .header-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 6px;
    font-weight: 300;
    letter-spacing: 0.3px;
  }
  .header-stats {
    display: flex;
    gap: 28px;
    align-items: center;
    flex-shrink: 0;
  }
  .hstat { text-align: right; }
  .hstat-num {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .hstat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 3px; }

  /* ─── LAYOUT ─── */
  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ─── SIDEBAR ─── */
  aside {
    width: 280px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: scroll;
    padding: 16px 0;
    height: 80vh;
  }
  .sidebar-section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    padding: 12px 20px 6px;
    font-weight: 600;
  }
  .career-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 9px 20px;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    transition: all 0.15s;
    border-left: 3px solid transparent;
    gap: 8px;
  }
  .career-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .career-btn.active {
    color: #fff;
    background: rgba(245,166,35,0.1);
    border-left-color: var(--accent);
    font-weight: 600;
  }
  .career-btn .cn { flex: 1; line-height: 1.3; }
  .career-badge {
    font-size: 11px;
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 2px 7px;
    color: var(--text-muted);
    flex-shrink: 0;
    font-weight: 500;
  }
  .career-btn.active .career-badge { background: rgba(245,166,35,0.2); color: var(--accent); }

  /* ─── MAIN ─── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 36px 40px;
    min-width: 0;
  }

  .career-header {
    margin-bottom: 32px;
    animation: fadeUp 0.3s ease;
  }
  .career-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 3vw, 40px);
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .career-name em { font-style: normal; color: var(--accent);display: block; font-size: 20px; }
  .career-meta {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .career-meta .dot { color: var(--border); }

  /* ─── KPI GRID ─── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
    animation: fadeUp 0.35s ease 0.05s both;
  }
  .kpi-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 12px 12px 0 0;
  }
  .kpi-age::before { background: var(--accent); }
  .kpi-exp::before { background: var(--accent2); }
  .kpi-know::before { background: var(--accent3); }
  .kpi-rec::before { background: var(--accent4); }
  .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); font-weight: 600; margin-bottom: 10px; }
  .kpi-value {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 700;
    line-height: 1;
    color: #fff;
  }
  .kpi-age .kpi-value { color: var(--accent); }
  .kpi-exp .kpi-value { color: var(--accent2); }
  .kpi-know .kpi-value { color: var(--accent3); }
  .kpi-rec .kpi-value { color: var(--accent4); }
  .kpi-unit { font-size: 16px; font-weight: 400; }
  .kpi-desc { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.4; }

  /* ─── BOTTOM GRID ─── */
  .bottom-grid {
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 20px;
    animation: fadeUp 0.35s ease 0.1s both;
  }

  .panel {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }
  .panel-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* palabras */
  .palabras-list { display: flex; flex-direction: column; gap: 14px; }
  .palabra-item {}
  .palabra-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .palabra-name { font-size: 15px; font-weight: 600; color: #fff; }
  .palabra-pct { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--accent); }
  .bar-track { height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.6s cubic-bezier(.22,.61,.36,1); }

  /* futuro */
  .futuro-list { display: flex; flex-direction: column; gap: 10px; }
  .futuro-item { display: flex; align-items: center; gap: 12px; }
  .futuro-label { font-size: 13px; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .futuro-bar-track { flex: 0 0 180px; height: 8px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
  .futuro-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(.22,.61,.36,1); }
  .futuro-pct { font-size: 13px; font-weight: 600; color: var(--text-muted); flex-shrink: 0; width: 38px; text-align: right; }

  .futuro-colors {
    --c0: #f5a623;
    --c1: #e8528a;
    --c2: #4ecdc4;
    --c3: #a78bfa;
    --c4: #64b5f6;
    --c5: #81c784;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* responsive */
  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .bottom-grid { grid-template-columns: 1fr; }
    aside { width: 240px; }
    main { padding: 24px 20px; }
    header { padding: 20px; }
    .header-stats { display: none; }
  }
  @media (max-width: 600px) {
    .layout { flex-direction: column; }
    aside { width: 100%; height: auto; max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
  }

  .note-sm { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-style: italic; }

    display: inline-block;

    background: rgba(245,166,35,0.15);

    border-radius: 20px;
    padding: 3px 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
</head>

const futuroColors = ['#f5a623','#e8528a','#4ecdc4','#a78bfa','#64b5f6','#81c784'];

let currentKey = null;

// Build sidebar
const sidebar = document.getElementById('sidebar');
const mainEl = document.getElementById('main');

// Group by area (simple heuristic)
const groups = {
  'Moda': ['Diseño de Moda','Producción de Modas','Marketing de la Moda','Comunicación de Moda'],
  'Diseño': ['Diseño de Interiores','Diseño Gráfico','Diseño Industrial','Lic. en Diseño (D+N+T)','Diseño de Ilustración','Diseño Digital','Diseño de Música y Sonido','Lic. en Diseño (CCC)','Lic. en Fotografía'],
  'Comunicación': ['Lic. en Publicidad','Dirección de Comunicación','Lic. en Com. Audiovisual','Lic. en Comunicación Digital','Producción Musical','Organización de Eventos','Lic. en Dir. Cinematográfica','Dirección Creativa Publicitaria','Lic. en Creación Sonora','Lic. en Relaciones Públicas','Actuación Profesional','Lic. en Negocios de Diseño','Lic. en Gestión de Proyectos']
};

Object.entries(groups).forEach(([groupName, keys]) => {
  const label = document.createElement('div');
  label.className = 'sidebar-section-label';
  label.textContent = groupName;
  sidebar.appendChild(label);

  keys.forEach(k => {
    if (!data[k]) return;
    const btn = document.createElement('button');
    btn.className = 'career-btn';
    btn.id = 'btn-' + k;
    btn.innerHTML = `<span class="cn">${k}</span><span class="career-badge">${data[k].n}</span>`;
    btn.addEventListener('click', () => showCareer(k));
    sidebar.appendChild(btn);
  });
});

function showCareer(key) {
  if (currentKey) {
    document.getElementById('btn-' + currentKey)?.classList.remove('active');
  }
  currentKey = key;
  document.getElementById('btn-' + key)?.classList.add('active');
  document.getElementById('btn-' + key)?.scrollIntoView({behavior:'smooth', block:'nearest'});

  const d = data[key];
  const isSmall = d.n < 15;

  mainEl.innerHTML = `
    <div class="career-header">
      <div style="margin-bottom:10px"><span class="career-pill">${d.n} respuestas - Ingreso 2025${isSmall ? ' · Muestra pequeña' : ''}</span></div>
      <div class="career-name">${formatName(d.full)}</div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card kpi-age">
        <div class="kpi-label">Edad promedio</div>
        <div class="kpi-value">${d.avg_age}<span class="kpi-unit"> años</span></div>
        <div class="kpi-desc">Promedio de los ingresantes a esta carrera</div>
      </div>
      <div class="kpi-card kpi-exp">
        <div class="kpi-label">Estudios previos</div>
        <div class="kpi-value">${d.pct_otra}<span class="kpi-unit">%</span></div>
        <div class="kpi-desc">Estudiaron o estudian otra carrera universitaria o terciaria</div>
      </div>
      <div class="kpi-card kpi-know">
        <div class="kpi-label">Conoce a alguien</div>
        <div class="kpi-value">${d.pct_conoce}<span class="kpi-unit">%</span></div>
        <div class="kpi-desc">Conocen a alguien que estudia en la Facultad de D&C</div>
      </div>
      <div class="kpi-card kpi-rec">
        <div class="kpi-label">Le recomendaron</div>
        <div class="kpi-value">${d.pct_recom}<span class="kpi-unit">%</span></div>
        <div class="kpi-desc">Recibieron una recomendación de la Facultad</div>
      </div>
    </div>

    <div class="bottom-grid">
      <div class="panel">
        <div class="panel-title">Top 2 palabras con que identifican a la Facultad</div>
        <div class="palabras-list">
          ${d.top_palabras.map((p,i) => `
            <div class="palabra-item">
              <div class="palabra-header">
                <span class="palabra-name">${p.palabra}</span>
                <span class="palabra-pct">${p.pct}%</span>
              </div>
              <div class="bar-track">
                <div class="bar-fill" style="width:0%" data-width="${p.pct}%"></div>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="note-sm">% calculado sobre el total de respuestas de la carrera (n=${d.n})</div>
      </div>

      <div class="panel futuro-colors">
        <div class="panel-title">¿Cómo se ven en el futuro?</div>
        <div class="futuro-list">
          ${d.futuro.map((f,i) => `
            <div class="futuro-item">
              <div class="futuro-label" title="${f.opcion}">${f.opcion}</div>
              <div class="futuro-bar-track">
                <div class="futuro-bar-fill" style="width:0%; background:${futuroColors[i] || '#888'}" data-width="${f.pct}%"></div>
              </div>
              <div class="futuro-pct" style="color:${futuroColors[i] || '#888'}">${f.pct}%</div>
            </div>
          `).join('')}
        </div>
        <div class="note-sm">% calculado sobre el total de respuestas de la carrera — múltiple opción</div>
      </div>
    </div>
    ${isSmall ? '<p style="margin-top:16px;font-size:12px;color:var(--text-muted);font-style:italic;">⚠ Esta carrera tiene menos de 15 respuestas. Los porcentajes deben interpretarse con cautela.</p>' : ''}
  `;

  // Animate bars after paint
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      mainEl.querySelectorAll('[data-width]').forEach(el => {
        el.style.width = el.getAttribute('data-width');
      });
    });
  });
}

function formatName(full) {
  // Italic anything in parentheses
  return full.replace(/\(([^)]+)\)/g, '<em>($1)</em>');
}

// Show first career
showCareer('Diseño de Moda');
</script>
